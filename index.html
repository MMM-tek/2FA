<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Generador 2FA Local</title>
    <!-- Importamos la librería OTPAuth para el cálculo del algoritmo RFC 6238 -->
    <script src="https://cdnjs.cloudflare.com"></script>
    <style>
        body { font-family: sans-serif; display: flex; justify-content: center; padding: 20px; background: #f4f4f9; }
        .card { background: white; padding: 2rem; border-radius: 12px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); width: 100%; max-width: 400px; text-align: center; }
        input { width: 100%; padding: 10px; margin: 10px 0; border: 1px solid #ccc; border-radius: 6px; box-sizing: border-box; }
        button { background: #007bff; color: white; border: none; padding: 10px 20px; border-radius: 6px; cursor: pointer; width: 100%; }
        #otp-display { font-size: 3rem; font-weight: bold; color: #007bff; margin: 20px 0; letter-spacing: 5px; }
        .timer { color: #666; font-size: 0.9rem; }
    </style>
</head>
<body>

<div class="card">
    <h2>Mi Generador 2FA</h2>
    
    <div id="setup-section">
        <p>Introduce tu clave secreta (Base32):</p>
        <input type="text" id="secret-input" placeholder="Ej: JBSWY3DPEHPK3PXP">
        <button onclick="saveSecret()">Guardar y Empezar</button>
    </div>

    <div id="auth-section" style="display:none;">
        <div id="otp-display">000000</div>
        <div class="timer">El código cambia en: <span id="seconds">--</span>s</div>
        <br>
        <button onclick="resetSecret()" style="background:#dc3545;">Borrar Clave Guardada</button>
    </div>
</div>

<script>
    let totp;

    // 1. Al cargar, verificamos si ya existe una clave en LocalStorage
    window.onload = () => {
        const savedSecret = localStorage.getItem('2fa_secret');
        if (savedSecret) {
            initTOTP(savedSecret);
        }
    };

    function saveSecret() {
        const secret = document.getElementById('secret-input').value.replace(/\s/g, '').toUpperCase();
        if (secret.length < 8) return alert("Clave no válida");
        
        // Guardamos en LocalStorage para persistencia
        localStorage.setItem('2fa_secret', secret);
        initTOTP(secret);
    }

    function initTOTP(secret) {
        document.getElementById('setup-section').style.display = 'none';
        document.getElementById('auth-section').style.display = 'block';

        // Configuramos el objeto TOTP según el estándar RFC 6238
        totp = new OTPAuth.TOTP({
            issuer: "MiApp",
            label: "Usuario",
            algorithm: "SHA1",
            digits: 6,
            period: 30,
            secret: secret
        });

        updateCode();
        setInterval(updateCode, 1000); // Actualiza cada segundo
    }

    function updateCode() {
        if (!totp) return;
        
        // Genera el token actual basado en el tiempo del sistema
        document.getElementById('otp-display').innerText = totp.generate();
        
        // Calcula segundos restantes para el próximo ciclo
        const seconds = 30 - (Math.floor(Date.now() / 1000) % 30);
        document.getElementById('seconds').innerText = seconds;
    }

    function resetSecret() {
        localStorage.removeItem('2fa_secret');
        location.reload();
    }
</script>

</body>
</html>
